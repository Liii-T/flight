<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2027 航班假期規劃</title>
    <style>
        :root {
            --primary-out: #28a745;
            --primary-in: #007bff;
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --text-main: #2d3436;
            --text-sub: #636e72;
            --holiday-red: #ff7675;
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
            --radius: 16px;
        }

        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            background: var(--bg-body); padding: 15px; color: var(--text-main); margin: 0; line-height: 1.5;
        }

        .container { 
            max-width: 400px; margin: 0 auto; background: var(--bg-card); 
            padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); 
        }

        .header { margin-bottom: 20px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h2 { margin: 0; font-size: 1.3em; letter-spacing: 1px; }

        .mode-selector { display: flex; background: #eee; padding: 4px; border-radius: 12px; margin-bottom: 15px; }
        .mode-btn {
            flex: 1; border: none; padding: 8px; border-radius: 10px; font-size: 0.85em; 
            cursor: pointer; background: transparent; color: var(--text-sub); transition: all 0.2s; font-weight: bold;
        }
        .mode-btn.active { background: white; color: var(--text-main); box-shadow: 0 2px 6px rgba(0,0,0,0.1); }

        .btn-reset { background: #dfe6e9; color: var(--text-sub); border: none; padding: 6px 12px; border-radius: 20px; font-size: 0.8em; cursor: pointer; }

        .calendar-section { display: flex; flex-direction: column; gap: 25px; }
        .month-title { 
            text-align: left; font-weight: 700; margin-bottom: 12px; font-size: 1.1em;
            color: #2d3436; padding-left: 5px; border-left: 4px solid #0984e3;
        }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .day-name { text-align: center; font-size: 0.7em; color: #b2bec3; font-weight: bold; margin-bottom: 5px; }
        
        .day { 
            aspect-ratio: 1; border-radius: 10px; display: flex; align-items: center; justify-content: center; 
            font-size: 0.95em; position: relative; transition: all 0.2s; border: 1px solid transparent; background: #fdfdfd;
        }
        .day.holiday { color: var(--holiday-red); }
        .day.has-out { background: #e6f7ec; color: var(--primary-out); font-weight: bold; }
        .day.has-in { background: #e7f3ff; color: var(--primary-in); font-weight: bold; }
        .day.selected-out { background: var(--primary-out) !important; color: white !important; box-shadow: 0 4px 10px rgba(40,167,69,0.3); transform: scale(1.1); z-index: 2; }
        .day.selected-in { background: var(--primary-in) !important; color: white !important; box-shadow: 0 4px 10px rgba(0,123,255,0.3); transform: scale(1.1); z-index: 2; }
        .day.disabled { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        .day.clickable { cursor: pointer; }

        .result-box { margin-top: 25px; background: #2d3436; color: white; padding: 18px; border-radius: var(--radius); }
        .res-grid { display: grid; grid-template-columns: repeat(3, 1fr); text-align: center; }
        .res-label { font-size: 0.7em; color: #b2bec3; margin-bottom: 4px; }
        .res-num { font-size: 1.1em; font-weight: bold; color: #ffe135; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: none; z-index: 99; }
        #modal { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: white; padding: 24px; border-radius: 24px; width: 90%; max-width: 360px; 
            display: none; z-index: 100; box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #modalTitle { margin: 0 0 15px 0; font-size: 1.2em; text-align: center; }
        .opt-btn { 
            width: 100%; text-align: left; padding: 15px; margin-bottom: 12px; border: 1px solid #f1f2f6; 
            border-radius: 15px; background: #f8f9fa; display: flex; flex-direction: column; gap: 4px;
        }
        .opt-row { display: flex; justify-content: space-between; align-items: center; }
        .opt-air { font-weight: bold; color: #2d3436; }
        .opt-price { color: #d63031; font-weight: 800; }
        .opt-time { font-size: 0.85em; color: #636e72; }
        .opt-rule { font-size: 0.75em; color: #ff7675; font-weight: bold; }
        .opt-arrival { font-size: 0.8em; color: #e67e22; margin-top: 4px; border-top: 1px solid #eee; padding-top: 4px; }
        .btn-close { width: 100%; border: none; background: none; color: #b2bec3; padding: 10px; cursor: pointer; }

        @keyframes popIn { from { bottom: -100px; opacity: 0; } to { bottom: 20px; opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-top">
            <h2>✈️ 2027 航班規劃</h2>
            <button class="btn-reset" onclick="resetAll()">🔄 清除</button>
        </div>
        <div class="mode-selector">
            <button id="mode-multi" class="mode-btn active" onclick="setTripMode('multi')">多點 (SEA/YVR)</button>
            <button id="mode-yvr" class="mode-btn" onclick="setTripMode('yvr')">單點 (YVR進出)</button>
        </div>
    </div>

    <div class="calendar-section" id="calendarRoot"></div>

    <div id="resultBox" class="result-box" style="display: none;">
        <div class="res-grid">
            <div><div class="res-label">總假期</div><div id="resTotal" class="res-num">-</div></div>
            <div><div class="res-label">需特休</div><div id="resLeave" class="res-num">-</div></div>
            <div><div class="res-label">總預算</div><div id="resPrice" class="res-num">-</div></div>
        </div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div id="modal">
    <h3 id="modalTitle">選擇航班</h3>
    <div id="modalOptions"></div>
    <button class="btn-close" onclick="closeModal()">關閉</button>
</div>

<script>
    var tripMode = 'multi';
    var selection = { out: null, in: null };

    var outData = [
        // 多點進出 (SEA)
        {id:'m_A', air:'星宇航空', date:'2027/02/26', time:'20:30-15:05', price:16881, rule:null, type:'multi'},
        {id:'m_B', air:'長榮航空', date:'2027/02/22', time:'23:40-18:10', price:16346, rule:null, type:'multi'},
        {id:'m_C', air:'長榮航空', date:'2027/02/23', time:'23:40-18:10', price:16346, rule:null, type:'multi'},
        {id:'m_D', air:'長榮航空', date:'2027/02/24', time:'23:40-18:10', price:16346, rule:null, type:'multi'},
        {id:'m_E', air:'長榮航空', date:'2027/02/25', time:'23:40-18:10', price:16346, rule:null, type:'multi'},
        {id:'m_F', air:'長榮航空', date:'2027/02/26', time:'23:40-18:10', price:17316, rule:null, type:'multi'},
        {id:'m_G', air:'長榮航空', date:'2027/02/27', time:'23:40-18:10', price:17316, rule:null, type:'multi'},
        {id:'m_H', air:'長榮航空', date:'2027/02/28', time:'23:40-18:10', price:17316, rule:null, type:'multi'},
        {id:'m_I', air:'長榮航空', date:'2027/03/01', time:'23:40-18:10', price:16346, rule:null, type:'multi'},
        {id:'m_J', air:'長榮航空', date:'2027/03/02', time:'23:40-18:10', price:16346, rule:null, type:'multi'},
        {id:'m_K', air:'長榮航空', date:'2027/03/03', time:'23:40-18:10', price:16346, rule:null, type:'multi'},
        {id:'m_L', air:'長榮航空', date:'2027/03/04', time:'23:40-18:10', price:16346, rule:null, type:'multi'},
        {id:'m_M', air:'長榮航空', date:'2027/02/27', time:'23:40-18:10', price:32315, rule:'in_a', type:'multi', note:'必搭回程3/13'},
        {id:'m_N', air:'長榮航空', date:'2027/02/27', time:'23:40-18:10', price:32315, rule:'in_b', type:'multi', note:'必搭回程3/14'},
        {id:'m_O', air:'長榮航空', date:'2027/02/26', time:'23:40-18:10', price:38329, rule:'in_a', type:'multi', note:'必搭回程3/13'},

        // 單點進出 (YVR) - New Update
        {id:'y_A', air:'長榮航空', date:'2027/02/21', time:'23:55-18:35', price:17828, rule:null, type:'yvr'},
        {id:'y_B', air:'長榮航空', date:'2027/02/22', time:'23:55-18:35', price:19962, rule:null, type:'yvr'},
        {id:'y_C', air:'長榮航空', date:'2027/02/23', time:'23:55-18:35', price:19962, rule:null, type:'yvr'},
        {id:'y_D', air:'長榮航空', date:'2027/02/24', time:'23:55-18:35', price:19962, rule:null, type:'yvr'},
        {id:'y_E', air:'長榮航空', date:'2027/02/25', time:'23:55-18:35', price:19962, rule:null, type:'yvr'},
        {id:'y_F', air:'長榮航空', date:'2027/02/26', time:'23:55-18:35', price:20447, rule:null, type:'yvr'},
        {id:'y_G', air:'長榮航空', date:'2027/02/27', time:'23:55-18:35', price:20447, rule:null, type:'yvr'},
        {id:'y_H', air:'長榮航空', date:'2027/02/28', time:'23:55-18:35', price:20447, rule:null, type:'yvr'},
        {id:'y_I', air:'長榮航空', date:'2027/03/01', time:'23:55-18:35', price:19962, rule:null, type:'yvr'},
        {id:'y_J', air:'長榮航空', date:'2027/03/02', time:'23:55-18:35', price:19962, rule:null, type:'yvr'},
        {id:'y_K', air:'長榮航空', date:'2027/03/03', time:'23:55-18:35', price:19962, rule:null, type:'yvr'}
    ];

    var inData = [
        // 多點回程 (YVR)
        {id:'in_a', air:'長榮航空', date:'2027/03/13', land:'2027/03/14', time:'00:15-05:15(+1)', price:0, type:'multi'},
        {id:'in_b', air:'長榮航空', date:'2027/03/14', land:'2027/03/15', time:'00:15-05:15(+1)', price:0, type:'multi'},
        {id:'in_c', air:'長榮航空', date:'2027/03/14', land:'2027/03/15', time:'00:15-05:15(+1)', price:22544, type:'multi'},
        {id:'in_d', air:'長榮航空', date:'2027/03/10', land:'2027/03/11', time:'00:15-05:15(+1)', price:19484, type:'multi'},
        {id:'in_e', air:'長榮航空', date:'2027/03/11', land:'2027/03/12', time:'00:15-05:15(+1)', price:19484, type:'multi'},

        // 單點回程 (YVR) - New Update
        {id:'iy_a', air:'長榮航空', date:'2027/03/09', land:'2027/03/10', time:'00:15-05:15(+1)', price:18254, type:'yvr'},
        {id:'iy_b', air:'長榮航空', date:'2027/03/10', land:'2027/03/11', time:'00:15-05:15(+1)', price:18254, type:'yvr'},
        {id:'iy_c', air:'長榮航空', date:'2027/03/11', land:'2027/03/12', time:'00:15-05:15(+1)', price:18254, type:'yvr'},
        {id:'iy_d', air:'長榮航空', date:'2027/03/12', land:'2027/03/13', time:'00:15-05:15(+1)', price:18254, type:'yvr'},
        {id:'iy_e', air:'長榮航空', date:'2027/03/13', land:'2027/03/14', time:'00:15-05:15(+1)', price:24269, type:'yvr'},
        {id:'iy_f', air:'長榮航空', date:'2027/03/14', land:'2027/03/15', time:'00:15-05:15(+1)', price:18254, type:'yvr'},
        {id:'iy_g', air:'長榮航空', date:'2027/03/17', land:'2027/03/18', time:'00:15-05:15(+1)', price:16508, type:'yvr'},
        {id:'iy_h', air:'長榮航空', date:'2027/03/18', land:'2027/03/19', time:'00:15-05:15(+1)', price:16508, type:'yvr'}
    ];

    function setTripMode(mode) {
        if (selection.out || selection.in) {
            if (!confirm("切換模式將重設目前的選擇，是否繼續？")) return;
        }
        tripMode = mode;
        document.getElementById('mode-multi').classList.toggle('active', mode === 'multi');
        document.getElementById('mode-yvr').classList.toggle('active', mode === 'yvr');
        resetAll();
    }

    function formatDate(y, m, d) {
        return y + '/' + (m < 10 ? '0' + m : m) + '/' + (d < 10 ? '0' + d : d);
    }

    function renderMonth(year, month) {
        var wrap = document.createElement('div');
        wrap.className = 'month';
        wrap.innerHTML = `<div class="month-title">${year} 年 ${month} 月</div>`;
        var grid = document.createElement('div');
        grid.className = 'grid';
        var headers = ['日','一','二','三','四','五','六'];
        headers.forEach(h => grid.innerHTML += `<div class="day-name">${h}</div>`);
        var firstDay = new Date(year, month - 1, 1).getDay();
        var totalDays = new Date(year, month, 0).getDate();
        for(var i=0; i<firstDay; i++) grid.innerHTML += '<div></div>';
        for(var d=1; d<=totalDays; d++) {
            var dateStr = formatDate(year, month, d);
            var div = document.createElement('div');
            div.className = 'day'; div.id = 'day-' + dateStr; div.innerText = d;
            var dow = new Date(year, month - 1, d).getDay();
            if(dow === 0 || dow === 6) div.classList.add('holiday');
            grid.appendChild(div);
        }
        wrap.appendChild(grid);
        return wrap;
    }

    function refreshUI() {
        var days = document.querySelectorAll('.day');
        days.forEach(day => {
            var dStr = day.id.replace('day-', '');
            day.className = day.className.replace(/has-out|has-in|disabled|clickable|selected-out|selected-in/g, '').trim();

            var vOut = outData.filter(f => f.date === dStr && f.type === tripMode && (!selection.in || (new Date(f.date) < new Date(selection.in.date) && (!f.rule || f.rule === selection.in.id))));
            var vIn = inData.filter(f => f.date === dStr && f.type === tripMode && (!selection.out || (new Date(f.date) > new Date(selection.out.date) && (!selection.out.rule || selection.out.rule === f.id))));

            if(vOut.length > 0) day.classList.add('has-out');
            if(vIn.length > 0) day.classList.add('has-in');
            if(selection.out && selection.out.date === dStr) day.classList.add('selected-out');
            if(selection.in && selection.in.date === dStr) day.classList.add('selected-in');

            var hasOutAny = outData.some(f => f.date === dStr && f.type === tripMode);
            if(selection.out && hasOutAny && selection.out.date !== dStr) day.classList.add('disabled');
            var hasInAny = inData.some(f => f.date === dStr && f.type === tripMode);
            if(selection.in && hasInAny && selection.in.date !== dStr) day.classList.add('disabled');

            if(vOut.length > 0 || vIn.length > 0) {
                day.classList.add('clickable');
                day.onclick = function() {
                    if((selection.out && selection.out.date === dStr) || (selection.in && selection.in.date === dStr)) {
                        if(confirm("取消此日期選擇？")) {
                            if(selection.out && selection.out.date === dStr) selection.out = null;
                            if(selection.in && selection.in.date === dStr) selection.in = null;
                            refreshUI();
                        }
                        return;
                    }
                    openModal(dStr, vOut, vIn);
                };
            }
        });
        updateResult();
    }

    function openModal(dateStr, vOut, vIn) {
        var list = document.getElementById('modalOptions');
        list.innerHTML = '';
        var isOut = vOut.length > 0 && !selection.out;
        document.getElementById('modalTitle').innerText = isOut ? '🛫 去程航班' : '🛬 回程航班';

        (isOut ? vOut : vIn).forEach(f => {
            var b = document.createElement('button');
            b.className = 'opt-btn';
            var ruleTag = f.note ? `<span class="opt-rule">(${f.note})</span>` : '';
            var landTag = f.land ? `<span class="opt-arrival">🗓️ 抵台：${f.land}</span>` : '';
            b.innerHTML = `<div class="opt-row"><span class="opt-air">${f.air}</span><span class="opt-price">$${f.price.toLocaleString()}</span></div>
                           <span class="opt-time">🕒 ${f.time} ${ruleTag}</span>${landTag}`;
            b.onclick = function() { if(isOut) selection.out = f; else selection.in = f; refreshUI(); closeModal(); };
            list.appendChild(b);
        });
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('overlay').style.display = 'none'; document.getElementById('modal').style.display = 'none'; }
    function resetAll() { selection = { out: null, in: null }; refreshUI(); }

    function updateResult() {
        var box = document.getElementById('resultBox');
        if(!selection.out || !selection.in) { box.style.display = 'none'; return; }
        var start = new Date(selection.out.date), arrival = new Date(selection.in.land);
        var total = Math.ceil((arrival - start) / 86400000) + 1, leave = 0, curr = new Date(start);
        while(curr <= arrival) {
            var dStr = formatDate(curr.getFullYear(), curr.getMonth()+1, curr.getDate());
            if(curr.getDay() !== 0 && curr.getDay() !== 6 && dStr !== '2027/03/01') leave++;
            curr.setDate(curr.getDate() + 1);
        }
        box.style.display = 'block';
        document.getElementById('resTotal').innerText = total + " 天";
        document.getElementById('resLeave').innerText = leave + " 天";
        document.getElementById('resPrice').innerText = "$" + (selection.out.price + selection.in.price).toLocaleString();
    }

    var root = document.getElementById('calendarRoot');
    root.appendChild(renderMonth(2027, 2)); root.appendChild(renderMonth(2027, 3));
    refreshUI();
</script>
</body>
</html>
