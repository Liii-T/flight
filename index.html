<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2027 航班假期規劃</title>
    <style>
        :root {
            --primary-out: #28a745;
            --primary-in: #007bff;
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --text-main: #2d3436;
            --text-sub: #636e72;
            --holiday-red: #ff7675;
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
            --radius: 16px;
        }

        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            background: var(--bg-body); 
            padding: 15px; 
            color: var(--text-main); 
            margin: 0;
            line-height: 1.5;
        }

        .container { 
            max-width: 400px; 
            margin: 0 auto; 
            background: var(--bg-card); 
            padding: 20px; 
            border-radius: var(--radius); 
            box-shadow: var(--shadow); 
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
        }

        h2 { margin: 0; font-size: 1.4em; letter-spacing: 1px; }

        .btn-reset { 
            background: #dfe6e9; 
            color: var(--text-sub); 
            border: none; 
            padding: 6px 12px; 
            border-radius: 20px; 
            font-size: 0.85em; 
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-reset:active { transform: scale(0.95); background: #b2bec3; }

        /* 日曆樣式優化 */
        .calendar-section { display: flex; flex-direction: column; gap: 25px; }
        .month-title { 
            text-align: left; 
            font-weight: 700; 
            margin-bottom: 12px; 
            font-size: 1.1em;
            color: #2d3436;
            padding-left: 5px;
            border-left: 4px solid #0984e3;
        }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .day-name { text-align: center; font-size: 0.7em; color: #b2bec3; font-weight: bold; margin-bottom: 5px; }
        
        .day { 
            aspect-ratio: 1; 
            border-radius: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 0.95em; 
            position: relative; 
            transition: all 0.2s;
            border: 1px solid transparent;
            background: #fdfdfd;
        }

        .day.holiday { color: var(--holiday-red); }
        .day.has-out { background: #e6f7ec; color: var(--primary-out); font-weight: bold; }
        .day.has-in { background: #e7f3ff; color: var(--primary-in); font-weight: bold; }
        
        /* 選中狀態 */
        .day.selected-out { background: var(--primary-out) !important; color: white !important; box-shadow: 0 4px 10px rgba(40,167,69,0.3); transform: scale(1.1); z-index: 2; }
        .day.selected-in { background: var(--primary-in) !important; color: white !important; box-shadow: 0 4px 10px rgba(0,123,255,0.3); transform: scale(1.1); z-index: 2; }
        
        .day.disabled { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        .day.clickable:active { transform: scale(0.9); }

        /* 結果顯示區域 */
        .result-box { 
            margin-top: 25px; 
            background: #2d3436; 
            color: white; 
            padding: 18px; 
            border-radius: var(--radius); 
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
        
        .res-grid { display: grid; grid-template-columns: repeat(3, 1fr); text-align: center; }
        .res-label { font-size: 0.7em; color: #b2bec3; margin-bottom: 4px; }
        .res-num { font-size: 1.1em; font-weight: bold; color: #ffe135; }

        /* 彈窗樣式 */
        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(4px); display: none; z-index: 99; 
        }
        #modal { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: white; padding: 24px; border-radius: 24px; 
            width: 90%; max-width: 360px; display: none; z-index: 100; 
            box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { bottom: -100px; opacity: 0; } to { bottom: 20px; opacity: 1; } }

        #modalTitle { margin: 0 0 15px 0; font-size: 1.2em; text-align: center; color: var(--text-main); }

        /* 航班選項按鈕 */
        .opt-btn { 
            width: 100%; text-align: left; padding: 15px; margin-bottom: 12px; 
            border: 1px solid #f1f2f6; border-radius: 15px; background: #f8f9fa;
            display: flex; flex-direction: column; gap: 4px; transition: all 0.2s;
        }
        .opt-btn:hover { border-color: #0984e3; background: #ebf7ff; }
        .opt-row { display: flex; justify-content: space-between; align-items: center; }
        .opt-air { font-weight: bold; font-size: 1em; color: #2d3436; }
        .opt-price { color: #d63031; font-weight: 800; font-size: 1.1em; }
        .opt-time { font-size: 0.85em; color: #636e72; }
        .opt-arrival { font-size: 0.8em; color: #e67e22; margin-top: 4px; border-top: 1px solid #eee; padding-top: 4px; }

        .btn-close { 
            width: 100%; border: none; background: none; color: #b2bec3; 
            padding: 10px; margin-top: 5px; font-size: 0.9em; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>✈️ 航班配對助教</h2>
        <button class="btn-reset" onclick="resetAll()">🔄 清除選擇</button>
    </div>

    <div class="calendar-section" id="calendarRoot"></div>

    <div id="resultBox" class="result-box" style="display: none;">
        <div class="res-grid">
            <div><div class="res-label">總假期</div><div id="resTotal" class="res-num">-</div></div>
            <div><div class="res-label">需特休</div><div id="resLeave" class="res-num">-</div></div>
            <div><div class="res-label">預估預算</div><div id="resPrice" class="res-num">-</div></div>
        </div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div id="modal">
    <h3 id="modalTitle">選擇航班</h3>
    <div id="modalOptions"></div>
    <button class="btn-close" onclick="closeModal()">取消並關閉</button>
</div>

<script>
    var outData = [
        {id:'A', air:'星宇航空', date:'2027/02/26', time:'20:30-15:05', price:16881, rule:null},
        {id:'B', air:'長榮航空', date:'2027/02/22', time:'23:40-18:10', price:16346, rule:null},
        {id:'C', air:'長榮航空', date:'2027/02/23', time:'23:40-18:10', price:16346, rule:null},
        {id:'D', air:'長榮航空', date:'2027/02/24', time:'23:40-18:10', price:16346, rule:null},
        {id:'E', air:'長榮航空', date:'2027/02/25', time:'23:40-18:10', price:16346, rule:null},
        {id:'F', air:'長榮航空', date:'2027/02/26', time:'23:40-18:10', price:17316, rule:null},
        {id:'G', air:'長榮航空', date:'2027/02/27', time:'23:40-18:10', price:17316, rule:null},
        {id:'H', air:'長榮航空', date:'2027/02/28', time:'23:40-18:10', price:17316, rule:null},
        {id:'I', air:'長榮航空', date:'2027/03/01', time:'23:40-18:10', price:16346, rule:null},
        {id:'J', air:'長榮航空', date:'2027/03/02', time:'23:40-18:10', price:16346, rule:null},
        {id:'K', air:'長榮航空', date:'2027/03/03', time:'23:40-18:10', price:16346, rule:null},
        {id:'L', air:'長榮航空', date:'2027/03/04', time:'23:40-18:10', price:16346, rule:null},
        {id:'M', air:'長榮航空', date:'2027/02/27', time:'23:40-18:10', price:0, rule:'a'},
        {id:'N', air:'長榮航空', date:'2027/02/27', time:'23:40-18:10', price:0, rule:'b'},
        {id:'O', air:'長榮航空', date:'2027/02/26', time:'23:40-18:10', price:6014, rule:'a'}
    ];

    var inData = [
        {id:'a', air:'長榮航空', date:'2027/03/13', land:'2027/03/14', time:'00:15-05:15(+1)', price:32315},
        {id:'b', air:'長榮航空', date:'2027/03/14', land:'2027/03/15', time:'00:15-05:15(+1)', price:32315},
        {id:'c', air:'長榮航空', date:'2027/03/14', land:'2027/03/15', time:'00:15-05:15(+1)', price:22544},
        {id:'d', air:'長榮航空', date:'2027/03/10', land:'2027/03/11', time:'00:15-05:15(+1)', price:19484},
        {id:'e', air:'長榮航空', date:'2027/03/11', land:'2027/03/12', time:'00:15-05:15(+1)', price:19484}
    ];

    var selection = { out: null, in: null };

    function formatDate(y, m, d) {
        return y + '/' + (m < 10 ? '0' + m : m) + '/' + (d < 10 ? '0' + d : d);
    }

    function renderMonth(year, month) {
        var wrap = document.createElement('div');
        wrap.className = 'month';
        wrap.innerHTML = '<div class="month-title">' + year + ' 年 ' + month + ' 月</div>';
        var grid = document.createElement('div');
        grid.className = 'grid';
        var headers = ['日','一','二','三','四','五','六'];
        for(var i=0; i<7; i++) grid.innerHTML += '<div class="day-name">' + headers[i] + '</div>';
        
        var firstDay = new Date(year, month - 1, 1).getDay();
        var totalDays = new Date(year, month, 0).getDate();

        for(var i=0; i<firstDay; i++) grid.innerHTML += '<div></div>';

        for(var d=1; d<=totalDays; d++) {
            var dateStr = formatDate(year, month, d);
            var div = document.createElement('div');
            div.className = 'day';
            div.id = 'day-' + dateStr;
            div.innerText = d;
            var dow = new Date(year, month - 1, d).getDay();
            if(dow === 0 || dow === 6) div.classList.add('holiday');
            grid.appendChild(div);
        }
        wrap.appendChild(grid);
        return wrap;
    }

    function refreshUI() {
        var days = document.querySelectorAll('.day');
        for(var i=0; i<days.length; i++) {
            var day = days[i];
            var dStr = day.id.replace('day-', '');
            day.className = day.className.replace(/has-out|has-in|disabled|clickable|selected-out|selected-in/g, '').trim();

            var vOut = [];
            for(var j=0; j<outData.length; j++) {
                var f = outData[j];
                if(f.date === dStr && (!selection.in || (new Date(f.date) < new Date(selection.in.date) && (!f.rule || f.rule === selection.in.id)))) vOut.push(f);
            }

            var vIn = [];
            for(var k=0; k<inData.length; k++) {
                var f = inData[k];
                if(f.date === dStr && (!selection.out || (new Date(f.date) > new Date(selection.out.date) && (!selection.out.rule || selection.out.rule === f.id)))) vIn.push(f);
            }

            if(vOut.length > 0) day.classList.add('has-out');
            if(vIn.length > 0) day.classList.add('has-in');
            if(selection.out && selection.out.date === dStr) day.classList.add('selected-out');
            if(selection.in && selection.in.date === dStr) day.classList.add('selected-in');

            // 互斥禁用邏輯
            var hasOutAny = outData.some(f => f.date === dStr);
            if(selection.out && hasOutAny && selection.out.date !== dStr) day.classList.add('disabled');
            var hasInAny = inData.some(f => f.date === dStr);
            if(selection.in && hasInAny && selection.in.date !== dStr) day.classList.add('disabled');

            if(vOut.length > 0 || vIn.length > 0) {
                day.classList.add('clickable');
                (function(d, vo, vi){
                    day.onclick = function() {
                        // 如果點擊已選中日期，詢問是否取消
                        if((selection.out && selection.out.date === d) || (selection.in && selection.in.date === d)) {
                            if(confirm("是否要取消並重設此日期的航班選擇？")) {
                                if(selection.out && selection.out.date === d) selection.out = null;
                                if(selection.in && selection.in.date === d) selection.in = null;
                                refreshUI();
                            }
                            return;
                        }

                        if((vo.length > 0 && selection.out && selection.out.date !== d) || (vi.length > 0 && selection.in && selection.in.date !== d)) {
                            if(confirm("切換日期將重設選擇，是否繼續？")) {
                                selection = {out: null, in: null};
                                refreshUI();
                                openModal(d, vo, vi);
                            }
                        } else {
                            openModal(d, vo, vi);
                        }
                    };
                })(dStr, vOut, vIn);
            }
        }
        updateResult();
    }

    function openModal(dateStr, vOut, vIn) {
        var list = document.getElementById('modalOptions');
        list.innerHTML = '';
        var isOut = vOut.length > 0 && !selection.out;
        
        document.getElementById('modalTitle').innerText = isOut ? '🛫 選擇去程航班' : '🛬 選擇回程航班';

        var targetData = isOut ? vOut : vIn;
        targetData.forEach(function(f){
            var b = document.createElement('button');
            b.className = 'opt-btn';
            var tag = f.rule ? '<span style="color:var(--holiday-red); font-size:0.75em;">(限定搭配特定航班)</span>' : '';
            var landInfo = f.land ? '<span class="opt-arrival">🗓️ 預計抵達台灣：' + f.land + '</span>' : '';
            
            b.innerHTML = `
                <div class="opt-row">
                    <span class="opt-air">${f.air}</span>
                    <span class="opt-price">$${f.price.toLocaleString()}</span>
                </div>
                <span class="opt-time">🕒 ${f.time} ${tag}</span>
                ${landInfo}
            `;
            b.onclick = function() { 
                if(isOut) selection.out = f; else selection.in = f; 
                refreshUI(); 
                closeModal(); 
            };
            list.appendChild(b);
        });

        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('modal').style.display = 'none';
    }

    function resetAll() {
        selection = { out: null, in: null };
        refreshUI();
    }

    function updateResult() {
        var box = document.getElementById('resultBox');
        if(!selection.out || !selection.in) {
            box.style.display = 'none';
            return;
        }
        var start = new Date(selection.out.date);
        var arrival = new Date(selection.in.land);
        var total = Math.ceil((arrival - start) / 86400000) + 1;
        var leave = 0;
        var curr = new Date(start);
        while(curr <= arrival) {
            var dow = curr.getDay();
            var dStr = formatDate(curr.getFullYear(), curr.getMonth()+1, curr.getDate());
            // 排除週六日與 3/1 補假
            if(dow !== 0 && dow !== 6 && dStr !== '2027/03/01') leave++;
            curr.setDate(curr.getDate() + 1);
        }
        box.style.display = 'block';
        document.getElementById('resTotal').innerText = total + " 天";
        document.getElementById('resLeave').innerText = leave + " 天";
        document.getElementById('resPrice').innerText = "$" + (selection.out.price + selection.in.price).toLocaleString();
    }

    var root = document.getElementById('calendarRoot');
    root.innerHTML = '';
    root.appendChild(renderMonth(2027, 2));
    root.appendChild(renderMonth(2027, 3));
    refreshUI();
</script>

</body>
</html>
