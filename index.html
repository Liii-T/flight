<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2027 航班規劃 v2</title>
    <style>
        :root {
            --primary-out: #28a745;
            --primary-in: #007bff;
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --text-main: #2d3436;
            --text-sub: #636e72;
            --holiday-red: #ff7675;
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
            --radius: 16px;
        }

        body { font-family: 'PingFang TC', sans-serif; background: var(--bg-body); padding: 15px; color: var(--text-main); margin: 0; }
        .container { max-width: 400px; margin: 0 auto; background: var(--bg-card); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); }
        .header { margin-bottom: 20px; }
        h2 { margin: 0; font-size: 1.3em; margin-bottom: 15px; }

        .filter-section {
            background: #f8f9fa; padding: 12px; border-radius: 12px; margin-bottom: 15px;
            display: flex; flex-direction: column; gap: 10px; border: 1px solid #eee;
        }
        .filter-row { display: flex; align-items: center; gap: 10px; font-size: 0.9em; font-weight: bold; }
        .filter-row input[type="number"] { width: 60px; padding: 4px; border: 1px solid #ddd; border-radius: 4px; }
        
        .mode-selector { display: flex; background: #eee; padding: 4px; border-radius: 12px; margin-bottom: 15px; }
        .mode-btn { flex: 1; border: none; padding: 8px; border-radius: 10px; font-size: 0.85em; cursor: pointer; background: transparent; color: var(--text-sub); font-weight: bold; }
        .mode-btn.active { background: white; color: var(--text-main); box-shadow: 0 2px 6px rgba(0,0,0,0.1); }

        .calendar-section { display: flex; flex-direction: column; gap: 20px; }
        .month-title { font-weight: 700; margin-bottom: 10px; border-left: 4px solid #0984e3; padding-left: 8px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day-name { text-align: center; font-size: 0.7em; color: #b2bec3; }
        .day { aspect-ratio: 1; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.9em; background: #fdfdfd; cursor: pointer; border: 1px solid transparent; }
        .day.holiday { color: var(--holiday-red); }
        .day.has-out { background: #e6f7ec; color: var(--primary-out); font-weight: bold; }
        .day.has-in { background: #e7f3ff; color: var(--primary-in); font-weight: bold; }
        .day.selected-out { background: var(--primary-out) !important; color: white !important; }
        .day.selected-in { background: var(--primary-in) !important; color: white !important; }
        .day.disabled { opacity: 0.2; pointer-events: none; }
        
        .result-box { margin-top: 20px; background: #2d3436; color: white; padding: 15px; border-radius: 12px; display: none; }
        .res-grid { display: grid; grid-template-columns: repeat(3, 1fr); text-align: center; }
        .res-num { font-size: 1.1em; font-weight: bold; color: #ffe135; }
        .res-label { font-size: 0.7em; color: #b2bec3; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 99; }
        #modal { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: white; padding: 20px; border-radius: 20px; width: 85%; max-width: 340px; display: none; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .opt-btn { width: 100%; text-align: left; padding: 12px; margin-bottom: 10px; border: 1px solid #eee; border-radius: 10px; background: #f8f9fa; cursor: pointer; }
        .opt-price { color: #d63031; font-weight: bold; float: right; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>✈️ 2027 航班規劃</h2>
        <div class="filter-section">
            <div class="filter-row">
                <label>📅 特休上限:</label>
                <input type="number" id="leaveFilter" value="10" oninput="refreshUI()">
                <span>天</span>
            </div>
            <div class="filter-row">
                <input type="checkbox" id="starluxToggle" checked onchange="refreshUI()">
                <label for="starluxToggle">包含星宇航空 (SEA 去程)</label>
            </div>
        </div>

        <div class="mode-selector">
            <button id="mode-multi" class="mode-btn active" onclick="setTripMode('multi')">多點 (SEA/YVR)</button>
            <button id="mode-yvr" class="mode-btn" onclick="setTripMode('yvr')">單點 (YVR)</button>
        </div>
    </div>

    <div id="calendarRoot" class="calendar-section"></div>

    <div id="resultBox" class="result-box">
        <div class="res-grid">
            <div><div class="res-label">總假期</div><div id="resTotal" class="res-num">-</div></div>
            <div><div class="res-label">需特休</div><div id="resLeave" class="res-num">-</div></div>
            <div><div class="res-label">總票價</div><div id="resPrice" class="res-num">-</div></div>
        </div>
        <div id="resNote" style="font-size: 0.7em; margin-top: 8px; color: #ffe135; text-align: center;"></div>
    </div>
    
    <button style="width:100%; margin-top:15px; padding:10px; border:none; border-radius:10px; background:#dfe6e9; cursor:pointer;" onclick="resetAll()">🔄 重置選擇</button>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div id="modal">
    <h3 id="modalTitle" style="margin-top:0">選擇航班</h3>
    <div id="modalOptions"></div>
    <button style="width:100%; background:none; border:none; color:#b2bec3;" onclick="closeModal()">關閉</button>
</div>

<script>
    let tripMode = 'multi';
    let selection = { out: null, in: null };

    // 資料定義
    const outData = [
        // YVR 單點 (EVA)
        { date: '2027/02/21', price: 17828, air: '長榮航空', type: 'yvr' },
        ...['2027/02/22', '2027/02/23', '2027/02/24', '2027/02/25', '2027/03/01', '2027/03/02', '2027/03/03'].map(d => ({ date: d, price: 19962, air: '長榮航空', type: 'yvr' })),
        ...['2027/02/26', '2027/02/27', '2027/02/28'].map(d => ({ date: d, price: 20447, air: '長榮航空', type: 'yvr' })),
        { date: '2027/03/04', price: 23357, air: '長榮航空', type: 'yvr' },
        
        // SEA 多點 (星宇)
        ...['2027/02/21', '2027/02/22', '2027/02/23', '2027/02/24', '2027/02/25', '2027/02/26', '2027/02/27', '2027/02/28', '2027/03/01', '2027/03/02', '2027/03/03', '2027/03/04'].map(d => ({ date: d, price: 16881, air: '星宇航空', type: 'multi' })),
        
        // SEA 多點 (長榮套票 - 虛擬價格代表)
        ...['2027/02/21', '2027/02/22', '2027/02/23', '2027/02/24', '2027/02/25', '2027/02/26', '2027/02/27', '2027/02/28', '2027/03/01', '2027/03/02', '2027/03/03', '2027/03/04'].map(d => ({ date: d, price: 0, air: '長榮航空', type: 'multi', isPackage: true }))
    ];

    const inData = [
        // YVR 出發 (EVA 一般票)
        { date: '2027/03/05', price: 18739, type: 'yvr' },
        { date: '2027/03/06', price: 21358, type: 'yvr' },
        { date: '2027/03/07', price: 16993, type: 'yvr' },
        { date: '2027/03/08', price: 21358, type: 'yvr' },
        { date: '2027/03/09', price: 18739, type: 'yvr' },
        { date: '2027/03/10', price: 18739, type: 'yvr' },
        { date: '2027/03/11', price: 18739, type: 'yvr' },
        { date: '2027/03/12', price: 18739, type: 'yvr' },
        { date: '2027/03/13', price: 24753, type: 'yvr' },
        { date: '2027/03/14', price: 18739, type: 'yvr' },
        { date: '2027/03/15', price: 21358, type: 'yvr' },
        { date: '2027/03/16', price: 18739, type: 'yvr' },
        { date: '2027/03/17', price: 16993, type: 'yvr' },
        { date: '2027/03/18', price: 16993, type: 'yvr' },

        // YVR 出發 (EVA 多點單程買)
        { date: '2027/03/05', price: 22501, type: 'multi' },
        { date: '2027/03/06', price: 24926, type: 'multi' },
        { date: '2027/03/07', price: 20379, type: 'multi' },
        { date: '2027/03/08', price: 21568, type: 'multi' },
        { date: '2027/03/09', price: 23993, type: 'multi' },
        { date: '2027/03/10', price: 19447, type: 'multi' },
        { date: '2027/03/11', price: 19447, type: 'multi' },
        { date: '2027/03/12', price: 24926, type: 'multi' },
        { date: '2027/03/13', price: 27211, type: 'multi' },
        { date: '2027/03/14', price: 22501, type: 'multi' },
        { date: '2027/03/15', price: 26278, type: 'multi' },
        { date: '2027/03/16', price: 23993, type: 'multi' },
        { date: '2027/03/17', price: 18537, type: 'multi' },
        { date: '2027/03/18', price: 18537, type: 'multi' },
        
        // 多點 (長榮套票用)
        ...['2027/03/05','2027/03/06','2027/03/07','2027/03/08','2027/03/09','2027/03/10','2027/03/11','2027/03/12','2027/03/13','2027/03/14','2027/03/15','2027/03/16','2027/03/17','2027/03/18'].map(d => ({ date: d, price: 0, type: 'multi', isPackage: true }))
    ];

    function calculateLeave(s, e) {
        let count = 0, cur = new Date(s), end = new Date(e);
        while(cur <= end) {
            let day = cur.getDay();
            let dStr = formatDate(cur.getFullYear(), cur.getMonth()+1, cur.getDate());
            // 排除週六(6)、週日(0) 及 2/28(和平紀念日), 3/1(補假)
            if(day !== 0 && day !== 6 && dStr !== '2027/02/26' && dStr !== '2027/03/01') count++;
            cur.setDate(cur.getDate() + 1);
        }
        return count;
    }

    function refreshUI() {
        const maxLeave = parseInt(document.getElementById('leaveFilter').value) || 99;
        const useStar = document.getElementById('starluxToggle').checked;
        
        document.querySelectorAll('.day').forEach(el => {
            const dStr = el.id.replace('day-', '');
            el.className = el.className.replace(/has-out|has-in|selected-out|selected-in|disabled/g, '').trim();
            
            // 去程可選
            const canOut = outData.filter(f => 
                f.date === dStr && f.type === tripMode && 
                (f.air !== '星宇航空' || useStar)
            );
            
            // 回程可選
            const canIn = inData.filter(f => f.date === dStr && f.type === tripMode);

            if(canOut.length > 0 && !selection.in) el.classList.add('has-out');
            if(canIn.length > 0 && selection.out) {
                if(new Date(dStr) > new Date(selection.out.date) && calculateLeave(selection.out.date, dStr) <= maxLeave) {
                    el.classList.add('has-in');
                }
            }

            if(selection.out && selection.out.date === dStr) el.classList.add('selected-out');
            if(selection.in && selection.in.date === dStr) el.classList.add('selected-in');
            
            // 範圍限制
            if(new Date(dStr) < new Date('2027/02/19') || new Date(dStr) > new Date('2027/03/18')) el.classList.add('disabled');
        });
        updateResult();
    }

    function openModal(dStr) {
        const useStar = document.getElementById('starluxToggle').checked;
        const list = document.getElementById('modalOptions');
        list.innerHTML = '';
        
        if(!selection.out) {
            document.getElementById('modalTitle').innerText = '🛫 選擇去程';
            const opts = outData.filter(f => f.date === dStr && f.type === tripMode && (f.air !== '星宇航空' || useStar));
            opts.forEach(f => {
                const b = document.createElement('button');
                b.className = 'opt-btn';
                const pText = f.isPackage ? "套票價" : `$${f.price.toLocaleString()}`;
                b.innerHTML = `<b>${f.air}</b> <span class="opt-price">${pText}</span>`;
                b.onclick = () => { selection.out = f; refreshUI(); closeModal(); };
                list.appendChild(b);
            });
        } else {
            document.getElementById('modalTitle').innerText = '🛬 選擇回程';
            const opts = inData.filter(f => f.date === dStr && f.type === tripMode && (f.isPackage === !!selection.out.isPackage));
            opts.forEach(f => {
                const b = document.createElement('button');
                b.className = 'opt-btn';
                const pText = f.isPackage ? "套票價" : `$${f.price.toLocaleString()}`;
                b.innerHTML = `<b>長榮航空</b> <span class="opt-price">${pText}</span>`;
                b.onclick = () => { selection.in = f; refreshUI(); closeModal(); };
                list.appendChild(b);
            });
        }
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modal').style.display = 'block';
    }

    function updateResult() {
        const box = document.getElementById('resultBox');
        if(!selection.out || !selection.in) { box.style.display = 'none'; return; }
        
        box.style.display = 'block';
        const days = Math.ceil((new Date(selection.in.date) - new Date(selection.out.date))/86400000) + 1;
        const leave = calculateLeave(selection.out.date, selection.in.date);
        
        let totalPrice = 0;
        let note = "";
        if(selection.out.isPackage) {
            totalPrice = 31000;
            note = "※ 長榮多點套票：價格約在 30k~32k 之間變化";
        } else {
            totalPrice = selection.out.price + selection.in.price;
        }

        document.getElementById('resTotal').innerText = days + " 天";
        document.getElementById('resLeave').innerText = leave + " 天";
        document.getElementById('resPrice').innerText = "$" + totalPrice.toLocaleString();
        document.getElementById('resNote').innerText = note;
    }

    function setTripMode(m) { tripMode = m; resetAll(); }
    function resetAll() { 
        selection = { out: null, in: null }; 
        document.getElementById('mode-multi').classList.toggle('active', tripMode === 'multi');
        document.getElementById('mode-yvr').classList.toggle('active', tripMode === 'yvr');
        refreshUI(); 
    }
    function closeModal() { document.getElementById('overlay').style.display = 'none'; document.getElementById('modal').style.display = 'none'; }
    function formatDate(y, m, d) { return `${y}/${m<10?'0'+m:m}/${d<10?'0'+d:d}`; }

    function renderCalendar() {
        const root = document.getElementById('calendarRoot');
        [2, 3].forEach(m => {
            const wrap = document.createElement('div');
            wrap.innerHTML = `<div class="month-title">2027 年 ${m} 月</div>`;
            const grid = document.createElement('div'); grid.className = 'grid';
            ['日','一','二','三','四','五','六'].forEach(h => grid.innerHTML += `<div class="day-name">${h}</div>`);
            
            const first = new Date(2027, m-1, 1).getDay();
            const total = new Date(2027, m, 0).getDate();
            for(let i=0; i<first; i++) grid.innerHTML += '<div></div>';
            for(let d=1; d<=total; d++) {
                const dStr = formatDate(2027, m, d);
                const el = document.createElement('div');
                el.className = 'day'; el.id = 'day-' + dStr;
                el.innerHTML = d;
                if(new Date(dStr).getDay()%6===0) el.classList.add('holiday');
                el.onclick = () => openModal(dStr);
                grid.appendChild(el);
            }
            wrap.appendChild(grid); root.appendChild(wrap);
        });
    }

    renderCalendar();
    refreshUI();
</script>

</body>
</html>
