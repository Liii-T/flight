<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2027 極光之旅航班規劃</title>
    <style>
        :root {
            --primary-out: #28a745;
            --primary-in: #007bff;
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --text-main: #2d3436;
            --text-sub: #636e72;
            --holiday-red: #ff7675;
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
            --radius: 16px;
            --starlux-purple: #5d3fd3;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-body);
            padding: 15px;
            color: var(--text-main);
            margin: 0;
            line-height: 1.5;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .header { margin-bottom: 20px; }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        h2 {
            margin: 0;
            font-size: 1.3em;
            letter-spacing: 1px;
        }

        .search-section {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid #eee;
        }

        .filter-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-section label {
            font-size: 0.85em;
            font-weight: bold;
            color: var(--text-sub);
        }

        .search-section input[type="number"] {
            flex: 1;
            border: 1px solid #ddd;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 0.9em;
        }
        
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85em;
            cursor: pointer;
            color: var(--text-main);
            font-weight: bold;
        }

        .checkbox-container input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .mode-selector {
            display: flex;
            background: #eee;
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .mode-btn {
            flex: 1;
            border: none;
            padding: 8px;
            border-radius: 10px;
            font-size: 0.85em;
            cursor: pointer;
            background: transparent;
            color: var(--text-sub);
            transition: all 0.2s;
            font-weight: bold;
        }

        .mode-btn.active {
            background: white;
            color: var(--text-main);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .btn-reset {
            background: #dfe6e9;
            color: var(--text-sub);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            cursor: pointer;
        }

        .calendar-section {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .month-title {
            text-align: left;
            font-weight: 700;
            margin-bottom: 12px;
            font-size: 1.1em;
            color: #2d3436;
            padding-left: 5px;
            border-left: 4px solid #0984e3;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .day-name {
            text-align: center;
            font-size: 0.7em;
            color: #b2bec3;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .day {
            aspect-ratio: 1;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.95em;
            position: relative;
            transition: all 0.2s;
            border: 1px solid transparent;
            background: #fdfdfd;
        }

        .day.holiday { color: var(--holiday-red); }
        .day.has-out { background: #e6f7ec; color: var(--primary-out); font-weight: bold; }
        .day.has-in { background: #e7f3ff; color: var(--primary-in); font-weight: bold; }

        .price-hint {
            font-size: 0.55em;
            font-weight: normal;
            margin-top: 2px;
            color: #0984e3;
            white-space: nowrap;
        }

        .day.selected-out {
            background: var(--primary-out) !important;
            color: white !important;
            box-shadow: 0 4px 10px rgba(40,167,69,0.3);
            transform: scale(1.1);
            z-index: 2;
        }

        .day.selected-in {
            background: var(--primary-in) !important;
            color: white !important;
            box-shadow: 0 4px 10px rgba(0,123,255,0.3);
            transform: scale(1.1);
            z-index: 2;
        }

        .day.disabled {
            opacity: 0.15;
            pointer-events: none;
            filter: grayscale(1);
        }

        .day.clickable { cursor: pointer; }

        .result-box {
            margin-top: 25px;
            background: #2d3436;
            color: white;
            padding: 18px;
            border-radius: var(--radius);
        }

        .res-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            text-align: center;
        }

        .res-label {
            font-size: 0.7em;
            color: #b2bec3;
            margin-bottom: 4px;
        }

        .res-num {
            font-size: 1.1em;
            font-weight: bold;
            color: #ffe135;
        }
        .day.best-crown::after {
            content: '👑';
            position: absolute;
            top: 2px;
            right: 2px;
            font-size: 0.72em;
            line-height: 1;
            z-index: 3;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.25));
        }
        
        .day.selected-out.best-crown::after,
        .day.selected-in.best-crown::after {
            top: 1px;
            right: 1px;
        }
        /* 排行榜 UI */
        .btn-toggle-rank {
            background: linear-gradient(135deg, #6c5ce7, #8e44ad);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 0.95em;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(108, 92, 231, 0.25);
            transition: all 0.2s ease;
        }

        .btn-toggle-rank:hover {
            transform: translateY(-1px);
        }

        .btn-toggle-rank:active {
            transform: scale(0.98);
        }

        #rankingSection {
            margin-top: 18px;
            animation: fadeInUp 0.25s ease;
        }

        #rankingSection h3 {
            font-size: 1em;
            margin: 14px 0 10px;
            color: #2d3436;
        }

        .rank-card {
            background: linear-gradient(180deg, #ffffff, #f8f9ff);
            border: 1px solid #eceef6;
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 12px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.06);
        }

        .rank-card.top {
            border: 2px solid #ffd166;
            box-shadow: 0 10px 22px rgba(255, 209, 102, 0.22);
        }

        .rank-tag {
            display: inline-block;
            font-size: 0.72em;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 999px;
            margin-bottom: 8px;
            color: white;
        }

        .tag-overall { background: linear-gradient(135deg, #f39c12, #e67e22); }
        .tag-cp { background: linear-gradient(135deg, #00b894, #00cec9); }
        .tag-cheap { background: linear-gradient(135deg, #0984e3, #6c5ce7); }

        .rank-info {
            font-size: 1em;
            font-weight: 800;
            color: #2d3436;
            margin-bottom: 4px;
        }

        .rank-detail {
            font-size: 0.85em;
            color: #636e72;
            margin-bottom: 8px;
        }

        .rank-price {
            font-size: 1.02em;
            font-weight: 800;
            color: #d63031;
        }

        .rank-price span {
            font-size: 0.8em;
            font-weight: 500;
            color: #636e72;
            margin-left: 4px;
        }

        .saving-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8f9fa;
            border: 1px solid #ececec;
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 0.88em;
            color: #2d3436;
        }

        .saving-item b {
            margin-left: auto;
            color: #00b894;
            white-space: nowrap;
        }

        .saving-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #6c5ce7;
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Modal */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: none;
            z-index: 99;
        }

        #modal {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 24px;
            border-radius: 24px;
            width: 90%;
            max-width: 360px;
            display: none;
            z-index: 100;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .opt-btn {
            width: 100%;
            text-align: left;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid #f1f2f6;
            border-radius: 15px;
            background: #f8f9fa;
        }

        .opt-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .opt-air {
            font-weight: bold;
            color: #2d3436;
        }

        .opt-price {
            color: #d63031;
            font-weight: 800;
        }

        .opt-time {
            font-size: 0.85em;
            color: #636e72;
        }

        .btn-close {
            width: 100%;
            border: none;
            background: none;
            color: #b2bec3;
            padding: 10px;
            cursor: pointer;
        }

        @keyframes popIn {
            from { bottom: -100px; opacity: 0; }
            to { bottom: 20px; opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-top">
            <h2>✈️ 2027 極光航班規劃</h2>
            <h3>2026/03/23 更新價格</h3>
            <button class="btn-reset" onclick="resetAll()">🔄 清除</button>
        </div>

        <div class="search-section">
            <div class="filter-row">
                <label>📅 特休上限:</label>
                <input type="number" id="leaveFilter" placeholder="10" oninput="refreshUI()">
            </div>
            <label class="checkbox-container">
                <input type="checkbox" id="starluxOnly" onchange="refreshUI()"> 優先搭乘星宇航空 (去程)
            </label>
            <label class="checkbox-container">
                <input type="checkbox" id="includeEtaEsta" onchange="refreshUI()">
                <h4>價格包含簽證<br> eTA (21 USD) + ESTA (7 CAD)</h4>
            </label>

            <label class="checkbox-container">
                <input type="checkbox" id="includeAmtrak" onchange="refreshUI()">
                <h4>價格包含 美→加 火車單趟<br> Amtrak Cascades (40 USD)</h4>
            </label>
        </div>

        <div class="mode-selector">
            <button id="mode-multi" class="mode-btn active" onclick="setTripMode('multi')">多點<br> <h4>(西雅圖SEA進/溫哥華YVR出)</h4></button>
            <button id="mode-yvr" class="mode-btn" onclick="setTripMode('yvr')">單點<br> <h4>(溫哥華YVR進出)</h4></button>
        </div>
    </div>

    <div class="calendar-section" id="calendarRoot"></div>

    <div id="resultBox" class="result-box" style="display: none;">
        <div class="res-grid">
            <div><div class="res-label">總假期</div><div id="resTotal" class="res-num">-</div></div>
            <div><div class="res-label">需特休</div><div id="resLeave" class="res-num">-</div></div>
            <div><div class="res-label">總預算</div><div id="resPrice" class="res-num">-</div></div>
        </div>
    </div>
    
    <button class="btn-reset btn-toggle-rank" onclick="toggleRanking()" style="margin-top:12px; width:100%;">
    🏆 查看推薦排行榜
</button>

<div id="rankingSection" style="display:none; margin-top:16px;">
    <h3>推薦排行榜<br>(包含特休成本計1500/天)</h3>
    <div id="modeRankList"></div>

    <h3 style="margin-top:16px;">省錢排行榜(平均單天成本)</h3>
    <div id="savingRankList"></div>
</div>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div id="modal">
    <h3 id="modalTitle" style="text-align: center;">選擇航班</h3>
    <div id="modalOptions"></div>
    <button class="btn-close" onclick="closeModal()">關閉</button>
</div>

<script>
    var tripMode = 'multi';
    var selection = { out: null, in: null };

    // 去程數據 (出發)
    var outFlights = [
        // 單點 YVR 長榮
        {date:'2027/02/21', price:17828, air:'長榮航空', type:'yvr'},
        {date:'2027/02/22', price:19962, air:'長榮航空', type:'yvr'},
        {date:'2027/02/23', price:19962, air:'長榮航空', type:'yvr'},
        {date:'2027/02/24', price:19962, air:'長榮航空', type:'yvr'},
        {date:'2027/02/25', price:19962, air:'長榮航空', type:'yvr'},
        {date:'2027/02/26', price:20447, air:'長榮航空', type:'yvr'},
        {date:'2027/02/27', price:20447, air:'長榮航空', type:'yvr'},
        {date:'2027/02/28', price:20447, air:'長榮航空', type:'yvr'},
        {date:'2027/03/01', price:19962, air:'長榮航空', type:'yvr'},
        {date:'2027/03/02', price:19962, air:'長榮航空', type:'yvr'},
        {date:'2027/03/03', price:19962, air:'長榮航空', type:'yvr'},
        {date:'2027/03/04', price:23357, air:'長榮航空', type:'yvr'},
        
        // 多點 SEA 星宇 (2/21~3/4 價格固定)
        ...Array.from({length: 12}, (_, i) => ({
            date: `2027/02/${21+i}`.replace('2027/02/29','2027/03/01').replace('2027/02/30','2027/03/02').replace('2027/02/31','2027/03/03').replace('2027/02/32','2027/03/04'),
            price: 16881, air: '星宇航空', type: 'multi'
        })).filter(f => new Date(f.date) <= new Date('2027/03/04')),
        
        // 多點 SEA 長榮 (套票)
        ...['2027/02/21','2027/02/22','2027/02/23','2027/02/24','2027/02/25','2027/02/26','2027/02/27','2027/02/28','2027/03/01','2027/03/02','2027/03/03','2027/03/04'].map(d => ({
            date: d, price: 0, isPackage: true, air:'長榮航空', type: 'multi'
        }))
    ];

    // 回程數據 (抵達)
    var inFlights = [
        // YVR 回程
        {date:'2027/03/05', p_yvr:18739, p_multi:22501},
        {date:'2027/03/06', p_yvr:21358, p_multi:24926},
        {date:'2027/03/07', p_yvr:16993, p_multi:20379},
        {date:'2027/03/08', p_yvr:21358, p_multi:21568},
        {date:'2027/03/09', p_yvr:18739, p_multi:23993},
        {date:'2027/03/10', p_yvr:18739, p_multi:19447},
        {date:'2027/03/11', p_yvr:18739, p_multi:19447},
        {date:'2027/03/12', p_yvr:18739, p_multi:24926},
        {date:'2027/03/13', p_yvr:24753, p_multi:27211},
        {date:'2027/03/14', p_yvr:18739, p_multi:22501},
        {date:'2027/03/15', p_yvr:21358, p_multi:26278},
        {date:'2027/03/16', p_yvr:18739, p_multi:23993},
        {date:'2027/03/17', p_yvr:16993, p_multi:18537},
        {date:'2027/03/18', p_yvr:16993, p_multi:18537}
    ];

    function calculateLeave(startStr, endStr) {
        let start = new Date(startStr), end = new Date(endStr), leave = 0, curr = new Date(start);
        while(curr <= end) {
            let dStr = formatDate(curr.getFullYear(), curr.getMonth()+1, curr.getDate());
            // 週六、週日、3/1 和平紀念日補假 視為放假
            if(curr.getDay() !== 0 && curr.getDay() !== 6 && dStr !== '2027/03/01') leave++;
            curr.setDate(curr.getDate() + 1);
        }
        return leave;
    }

    function getTripPrice(outFlight, inFlight) {
    const addonCost = getAddonCostTWD();

    if (tripMode === 'yvr') {
        return outFlight.price + inFlight.p_yvr + addonCost;
    }

    // 多點模式
    if (outFlight.air === '星宇航空') {
        return outFlight.price + inFlight.p_multi + addonCost;
    }

    return 32000 + addonCost;
}

function getBestCrownDates(candidateOutFlights, maxLeave) {
    const outDates = new Set();
    const inDates = new Set();

    let validPairs = [];

    let usableOutFlights = candidateOutFlights;
    if (selection.out) {
        usableOutFlights = candidateOutFlights.filter(f => f.date === selection.out.date && f.air === selection.out.air);
    }

    usableOutFlights.forEach(out => {
        inFlights.forEach(inputFlight => {
            if (new Date(inputFlight.date) <= new Date(out.date)) return;

            const leaveDays = calculateLeave(out.date, inputFlight.date);
            if (leaveDays > maxLeave) return;

            if (selection.in && selection.in.date !== inputFlight.date) return;

            validPairs.push({
                outDate: out.date,
                inDate: inputFlight.date,
                totalPrice: getTripPrice(out, inputFlight)
            });
        });
    });

    if (validPairs.length === 0) {
        return { outDates, inDates };
    }

    const bestPrice = Math.min(...validPairs.map(p => p.totalPrice));

    validPairs
        .filter(p => p.totalPrice === bestPrice)
        .forEach(p => {
            outDates.add(p.outDate);
            inDates.add(p.inDate);
        });

    return { outDates, inDates };
}

    function toggleRanking() {
    const sec = document.getElementById('rankingSection');
    const btn = document.querySelector('.btn-toggle-rank');
    if (!sec || !btn) return;

    const isHidden = sec.style.display === 'none' || sec.style.display === '';
    sec.style.display = isHidden ? 'block' : 'none';
    btn.innerHTML = isHidden ? '🔼 隱藏推薦排行榜' : '🏆 查看推薦排行榜';
}
    
    function setTripMode(mode) {
        if (selection.out || selection.in) { if (!confirm("重設選擇？")) return; }
        tripMode = mode;
        document.getElementById('mode-multi').classList.toggle('active', mode === 'multi');
        document.getElementById('mode-yvr').classList.toggle('active', mode === 'yvr');
        resetAll();
    }


    function formatDate(y, m, d) { return y + '/' + (m < 10 ? '0' + m : m) + '/' + (d < 10 ? '0' + d : d); }

    function refreshUI() {
    var days = document.querySelectorAll('.day');
    var maxLeave = parseInt(document.getElementById('leaveFilter').value) || 99;
    var starluxOnly = document.getElementById('starluxOnly').checked;

    // 先找目前模式下可用的去程
    var candidateOutFlights = outFlights.filter(f => {
        if (f.type !== tripMode) return false;
        if (starluxOnly && f.air !== '星宇航空') return false;
        if (!starluxOnly && f.air === '星宇航空') return false;
        return true;
    });

    // 算出目前條件下的最佳日期組合，用來加皇冠
    var bestMarks = getBestCrownDates(candidateOutFlights, maxLeave);

    days.forEach(day => {
        var dStr = day.id.replace('day-', '');
        day.className = day.className.replace(/has-out|has-in|disabled|clickable|selected-out|selected-in|best-crown/g, '').trim();

        // 去程邏輯
        var vOut = candidateOutFlights.filter(f => f.date === dStr);

        // 回程邏輯
        var vIn = inFlights.filter(f => {
            if (f.date !== dStr) return false;

            // 已選去程：只看這個去程能不能搭
            if (selection.out) {
                return new Date(f.date) > new Date(selection.out.date) &&
                       calculateLeave(selection.out.date, f.date) <= maxLeave;
            }

            // 未選去程：只要有任一去程可搭，就保留
            return candidateOutFlights.some(out => {
                return new Date(f.date) > new Date(out.date) &&
                       calculateLeave(out.date, f.date) <= maxLeave;
            });
        });

        if (vOut.length > 0) day.classList.add('has-out');
        if (vIn.length > 0) day.classList.add('has-in');

        if (selection.out && selection.out.date === dStr) day.classList.add('selected-out');
        if (selection.in && selection.in.date === dStr) day.classList.add('selected-in');

        // 最佳選項加皇冠
        if (bestMarks.outDates.has(dStr) || bestMarks.inDates.has(dStr)) {
            day.classList.add('best-crown');
        }

        if ((vOut.length > 0) || (vIn.length > 0)) {
            day.classList.add('clickable');
            day.onclick = () => openModal(dStr, vOut, vIn);
        } else {
            day.classList.add('disabled');
            day.onclick = null;
        }
    });

    updateResult();
    updateRankings();
}


  // 排行榜資料與更新
const rankData = {
    multi: [
        { tag: 'CP值最佳', title: '02/27 ~ 03/14 長榮多點套票', tripDays: 17, leaveDays: 10, ticketPrice: 32000, class: 'tag-overall', top: true },
        { tag: '星宇首選', title: '02/26 ~ 03/17 星宇+長榮', tripDays: 21, leaveDays: 14, ticketPrice: 35418, class: 'tag-cp' },
        { tag: '小資首選', title: '02/27 ~ 03/07 長榮多點套票', tripDays: 10, leaveDays: 4, ticketPrice: 32000, class: 'tag-cheap' },
    ],
    yvr: [
        { tag: 'CP值最佳', title: '02/21 ~ 03/17 長榮單點', tripDays: 26, leaveDays: 18, ticketPrice: 34821, class: 'tag-overall', top: true },
        { tag: '小資首選', title: '02/21 ~ 03/07 長榮單點', tripDays: 16, leaveDays: 10, ticketPrice: 34821, class: 'tag-cheap' },
    ]
};

function updateRankings() {
    const list = document.getElementById('modeRankList');
    const saving = document.getElementById('savingRankList');
    if (!list || !saving) return;

    list.innerHTML = '';

    const addon = getMandatoryAddonForRanking(tripMode);

    rankData[tripMode].forEach(item => {
        const leaveCost = item.leaveDays * 1500;
        const totalPrice = item.ticketPrice + leaveCost + addon;

        const card = document.createElement('div');
        card.className = `rank-card ${item.top ? 'top' : ''}`;
        card.innerHTML = `
            <span class="rank-tag ${item.class}">${item.tag}</span>
            <div class="rank-info">${item.title}</div>
            <div class="rank-detail">旅遊 ${item.tripDays} 天 / 請 ${item.leaveDays} 天</div>
            <div class="rank-price">$${totalPrice.toLocaleString()} 
                <span>(機票 $${item.ticketPrice.toLocaleString()} + 特休 $${leaveCost.toLocaleString()}${addon > 0 ? ` + 附加 $${addon.toLocaleString()}` : ''})</span>
            </div>
        `;
        list.appendChild(card);
    });

    // 省錢排行榜也要跟著模式重算，不要再寫死
    const savingData = rankData[tripMode].map(item => {
        const leaveCost = item.leaveDays * 1500;
        const totalPrice = item.ticketPrice + leaveCost + addon;
        const dailyCost = Math.round(totalPrice / item.tripDays);

        return {
            title: item.title,
            tripDays: item.tripDays,
            leaveDays: item.leaveDays,
            dailyCost
        };
    }).sort((a, b) => a.dailyCost - b.dailyCost);

    saving.innerHTML = savingData.map((item, idx) => `
        <div class="saving-item">
            <span class="saving-num">${idx + 1}</span>
            <span>${item.title} (${item.tripDays}天/${item.leaveDays}天)</span>
            <b>$${item.dailyCost.toLocaleString()}/日</b>
        </div>
    `).join('');
}
    
    function openModal(dateStr, vOut, vIn) {
    const isSelectedOut = selection.out && selection.out.date === dateStr;
    const isSelectedIn = selection.in && selection.in.date === dateStr;

    if (isSelectedOut || isSelectedIn) {
        const ok = confirm("是否要取消已勾選日期？");
        if (!ok) return;

        if (isSelectedOut) {
            selection.out = null;
            selection.in = null; // 去程取消時，回程也一起清掉
        } else if (isSelectedIn) {
            selection.in = null;
        }

        refreshUI();
        return;
    }

    var list = document.getElementById('modalOptions');
    list.innerHTML = '';

    var isOutMode = vOut.length > 0 && !selection.out;
    document.getElementById('modalTitle').innerText = isOutMode ? '🛫 選擇去程航班' : '🛬 選擇回程航班';

    var flights = isOutMode ? vOut : vIn;
    flights.forEach(f => {
        var b = document.createElement('button');
        b.className = 'opt-btn';

        let displayPrice = "";
        if (isOutMode) {
            displayPrice = f.isPackage ? "套票包含" : `$${f.price.toLocaleString()}`;
            b.innerHTML = `<div class="opt-row"><span class="opt-air">${f.air}</span><span class="opt-price">${displayPrice}</span></div>`;
        } else {
            let p = (tripMode === 'yvr') ? f.p_yvr : f.p_multi;
            displayPrice = `$${p.toLocaleString()}`;
            b.innerHTML = `<div class="opt-row"><span class="opt-air">長榮航空</span><span class="opt-price">${displayPrice}</span></div>`;
        }

        b.onclick = function() {
            if (isOutMode) selection.out = f;
            else selection.in = f;
            refreshUI();
            closeModal();
        };
        list.appendChild(b);
    });

    document.getElementById('overlay').style.display = 'block';
    document.getElementById('modal').style.display = 'block';
}

    function updateResult() {
        var box = document.getElementById('resultBox');
        if(!selection.out || !selection.in) {
            box.style.display = 'none';
            return;
        }
        
        var start = new Date(selection.out.date), end = new Date(selection.in.date);
        var total = Math.ceil((end - start) / 86400000) + 1;
        var leave = calculateLeave(selection.out.date, selection.in.date);
        var addonCost = getAddonCostTWD();
        
        box.style.display = 'block';
        document.getElementById('resTotal').innerText = total + " 天";
        document.getElementById('resLeave').innerText = leave + " 天";
    
        let finalPriceText = "";
        if (tripMode === 'yvr') {
            finalPriceText = "$" + (selection.out.price + selection.in.p_yvr + addonCost).toLocaleString();
        } else {
            // 多點模式
            if (selection.out.air === '星宇航空') {
                finalPriceText = "$" + (selection.out.price + selection.in.p_multi + addonCost).toLocaleString();
            } else {
                // 長榮多點套票區間價
                const low = 30000 + addonCost;
                const high = 32000 + addonCost;
                finalPriceText = `約 ${low.toLocaleString()} ~ ${high.toLocaleString()}`;
            }
        }
    
        document.getElementById('resPrice').innerText = finalPriceText;
    }

    function closeModal() { document.getElementById('overlay').style.display = 'none'; document.getElementById('modal').style.display = 'none'; }
    function resetAll() { selection = { out: null, in: null }; refreshUI(); }

    function renderMonth(year, month) {
        var wrap = document.createElement('div');
        wrap.className = 'month';
        wrap.innerHTML = `<div class="month-title">${year} 年 ${month} 月</div>`;
        var grid = document.createElement('div'); grid.className = 'grid';
        ['日','一','二','三','四','五','六'].forEach(h => grid.innerHTML += `<div class="day-name">${h}</div>`);
        var firstDay = new Date(year, month - 1, 1).getDay();
        var totalDays = new Date(year, month, 0).getDate();
        for(var i=0; i<firstDay; i++) grid.innerHTML += '<div></div>';
        for(var d=1; d<=totalDays; d++) {
            var dateStr = formatDate(year, month, d);
            var div = document.createElement('div'); div.className = 'day'; div.id = 'day-' + dateStr; 
            div.innerHTML = `<span>${d}</span>`;
            if(new Date(year, month - 1, d).getDay() % 6 === 0) div.classList.add('holiday');
            // 標註 3/1 補假
            if(dateStr === '2027/03/01') div.classList.add('holiday');
            grid.appendChild(div);
        }
        wrap.appendChild(grid); return wrap;
    }

    const FX_RATE = {
    USD_TO_TWD: 32,
    CAD_TO_TWD: 24
    };
    
    function getMandatoryAddonForRanking(mode) {
    let addon = 0;

    if (mode === 'multi') {
        addon += 21 * FX_RATE.USD_TO_TWD; // ETA
        addon += 7 * FX_RATE.CAD_TO_TWD;  // ESTA
        addon += 40 * FX_RATE.USD_TO_TWD; // Amtrak
    }

    return Math.round(addon);
}
    function getAddonCostTWD() {
        const includeEtaEsta = document.getElementById('includeEtaEsta')?.checked;
        const includeAmtrak = document.getElementById('includeAmtrak')?.checked;
    
        let addon = 0;
    
        // ETA + ESTA
        if (includeEtaEsta) {
            addon += 21 * FX_RATE.USD_TO_TWD;
            addon += 7 * FX_RATE.CAD_TO_TWD;
        }
    
        // SEA -> YVR 火車，只在多點模式計算
        if (includeAmtrak && tripMode === 'multi') {
            addon += 40 * FX_RATE.USD_TO_TWD;
        }
    
        return Math.round(addon);
    }
    
    var root = document.getElementById('calendarRoot');
    root.appendChild(renderMonth(2027, 2)); 
    root.appendChild(renderMonth(2027, 3));
    refreshUI();
</script>
